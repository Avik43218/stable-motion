<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            margin: 0;
        }

        .vibey-btn {
            background: linear-gradient(45deg, #ff007f, #7928ca);
            color: white;

            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 800;
            border: none;
            border-radius: 30px; 
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(121, 40, 202, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            outline: none;
            
            min-width: 260px;
            text-align: center;
        }

        /* Default */
        .vibey-btn::after {
            content: "Click";
        }

        /* Hover */
        .vibey-btn:hover {
            transform: translateY(-4px) scale(1.05); /* Softer pop for a smaller button */
            box-shadow: 0 10px 20px rgba(255, 0, 127, 0.5);
        }
        .vibey-btn:hover::after {
            content: "Button is Hovered";
        }

        /* Click */
        .vibey-btn:active {
            transform: translateY(2px) scale(0.95);
            box-shadow: 0 3px 6px rgba(121, 40, 202, 0.2);
        }
        .vibey-btn:active::after {
            content: "Click Detected";
        }
    </style>
</head>
<body>

    <button class="vibey-btn" type="button" onclick="return false;"></button>

</body>
</html>
